<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filters for glowing effects and shadows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1b153d" />
    </linearGradient>

    <!-- Outer Squircle Border Gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.7" />
      <stop offset="40%" stop-color="#4f46e5" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#0d9488" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.7" />
    </linearGradient>

    <!-- Center Spotlight Radial Glow -->
    <radialGradient id="innerGlow" cx="256" cy="256" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>

    <!-- Symmetric Neural M Gradient -->
    <linearGradient id="mGrad" x1="140" y1="150" x2="372" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="35%" stop-color="#4f46e5" />
      <stop offset="65%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Cloud/Brain Lobe Curves Gradient -->
    <linearGradient id="brainGrad" x1="60" y1="120" x2="452" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.55" />
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.55" />
    </linearGradient>
  </defs>

  <!-- Background squircle with drop shadow -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="6" filter="url(#softShadow)" />

  <!-- Center radial spotlight -->
  <circle cx="256" cy="256" r="200" fill="url(#innerGlow)" />

  <!-- Connected Cloud/Brain Hemisphere Curves (representing memory and mind mapping) -->
  <g stroke="url(#brainGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" filter="url(#glow)">
    <!-- Left outer hemisphere -->
    <path d="M 198,150 C 90,130 60,240 60,300 C 60,360 100,370 140,370" />
    <!-- Right outer hemisphere -->
    <path d="M 314,150 C 422,130 452,240 452,300 C 452,360 412,370 372,370" />
    
    <!-- Top central fissure curve -->
    <path d="M 198,150 C 215,130 235,120 256,120 C 277,120 297,130 314,150" />

    <!-- Left inner neural wave -->
    <path d="M 140,310 C 105,290 105,245 140,225 C 160,210 180,190 198,150" />
    <!-- Right inner neural wave -->
    <path d="M 372,310 C 407,290 407,245 372,225 C 352,210 332,190 314,150" />
  </g>

  <!-- Dotted Neural Connectors (Memory Pathways) -->
  <g stroke="#a5b4fc" stroke-width="2" stroke-dasharray="4 6" fill="none" opacity="0.65">
    <path d="M 140,225 L 256,270" />
    <path d="M 372,225 L 256,270" />
    <path d="M 60,300 L 256,270" />
    <path d="M 452,300 L 256,270" />
    <path d="M 256,120 L 256,270" />
  </g>

  <!-- The Core Neural Symmetric M Pathway (The main hero element) -->
  <path d="M 140,370 L 198,150 L 256,270 L 314,150 L 372,370" stroke="url(#mGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />

  <!-- Synaptic Nodes (Glowing interface circles at key network junctions) -->
  <!-- White highlight nodes on the core M -->
  <g fill="#ffffff" filter="url(#nodeGlow)">
    <circle cx="140" cy="370" r="5.5" />
    <circle cx="256" cy="270" r="7" />
    <circle cx="372" cy="370" r="5.5" />
  </g>

  <!-- Secondary synapse nodes with accent glows -->
  <g filter="url(#nodeGlow)">
    <circle cx="198" cy="150" r="5" fill="#818cf8" />
    <circle cx="314" cy="150" r="5" fill="#818cf8" />
    
    <circle cx="60" cy="300" r="4.5" fill="#a5b4fc" />
    <circle cx="452" cy="300" r="4.5" fill="#34d399" />
    <circle cx="140" cy="225" r="4.5" fill="#a5b4fc" />
    <circle cx="372" cy="225" r="4.5" fill="#34d399" />
    <circle cx="256" cy="120" r="4.5" fill="#818cf8" />
  </g>
</svg>
